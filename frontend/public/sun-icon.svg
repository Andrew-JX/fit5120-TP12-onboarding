<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" fill="#f5c842" opacity="0.25"/>
  <!-- Sun rays -->
  <g stroke="#e8622a" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="4"  x2="32" y2="12"/>
    <line x1="32" y1="52" x2="32" y2="60"/>
    <line x1="4"  y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="60" y2="32"/>
    <line x1="11.5" y1="11.5" x2="17.2" y2="17.2"/>
    <line x1="46.8" y1="46.8" x2="52.5" y2="52.5"/>
    <line x1="52.5" y1="11.5" x2="46.8" y2="17.2"/>
    <line x1="17.2" y1="46.8" x2="11.5" y2="52.5"/>
  </g>
  <!-- Sun core -->
  <circle cx="32" cy="32" r="14" fill="#e8622a"/>
  <!-- Highlight -->
  <circle cx="27" cy="27" r="4" fill="#f5c842" opacity="0.6"/>
</svg>
